<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행성 MBTI</title>
    <link rel="stylesheet" href="../bread/style.css">
    <style>
        .back-btn { position: absolute; top: 20px; left: 20px; padding: 10px 20px; background-color: #6610f2; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .progress { background-color: #6610f2; }
        #start-page button { background-color: #6610f2; }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← 홈으로</a>
    <div class="container">
        <div id="start-page">
            <h1>나의 행성 MBTI</h1>
            <input type="text" id="name" placeholder="이름을 입력해주세요">
            <button id="start-btn">시작하기</button>
        </div>
        <div id="question-page" class="hidden">
            <div class="progress-bar"><div class="progress"></div></div>
            <h2 id="question"></h2>
            <div id="choices"></div>
        </div>
        <div id="result-page" class="hidden">
            <h2 id="result-title"></h2>
            <p id="result-desc"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
