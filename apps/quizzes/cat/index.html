<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이 MBTI 테스트</title>
    <link rel="stylesheet" href="../bread/style.css">
    <style>
        .back-btn { position: absolute; top: 20px; left: 20px; padding: 10px 20px; background-color: #20c997; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .progress { background-color: #20c997; }
        #start-page button { background-color: #20c997; }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← 홈으로</a>
    <div class="container">
        <div id="start-page">
            <h1>내가 고양이라면?</h1>
            <p class="text-muted mb-4">나의 성격은 어떤 고양이와 닮았을까요?</p>
            <input type="text" id="name" placeholder="이름을 입력해주세요">
            <button id="start-btn">시작하기</button>
        </div>
        <div id="question-page" class="hidden">
            <div class="progress-bar"><div class="progress"></div></div>
            <h2 id="question"></h2>
            <div id="choices"></div>
        </div>
        <div id="result-page" class="hidden">
            <h2 id="result-title"></h2>
            <img id="result-img" src="" alt="결과 이미지" style="display:none;">
            <p id="result-desc" class="mt-3"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
