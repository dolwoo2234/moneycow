<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숲속 동물 MBTI</title>
    <link rel="stylesheet" href="../bread/style.css">
    <style>
        .back-btn { position: absolute; top: 20px; left: 20px; padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .progress { background-color: #28a745; }
        #start-page button { background-color: #28a745; }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← 홈으로</a>
    <div class="container">
        <div id="start-page">
            <h1>나는 어떤 동물일까?</h1>
            <input type="text" id="name" placeholder="이름을 입력해주세요">
            <button id="start-btn">시작하기</button>
        </div>
        <div id="question-page" class="hidden">
            <div class="progress-bar"><div class="progress"></div></div>
            <h2 id="question"></h2>
            <div id="choices"></div>
        </div>
        <div id="result-page" class="hidden">
            <h2 id="result-title"></h2>
            <p id="result-desc"></p>
            <img id="result-img" src="#" alt="결과 이미지" style="display:none; max-width: 100%; margin: 20px auto;">
            <div id="no-image-text" style="display:none; color: #888; margin-top: 10px;">이미지 준비 중입니다.</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
