<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BREAD & FORTUNE</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .container {
            max-width: 900px;
        }
        .hover-card {
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .hover-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important;
        }
        .card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            padding: 2rem;
            text-align: center;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container py-5 text-center">
    <header class="mb-5">
        <h1 class="display-3 fw-bold text-dark mb-3">BREAD & FORTUNE</h1>
        <p class="fs-4 text-muted">원하시는 서비스를 선택해주세요</p>
    </header>

    <div class="row g-4 justify-content-center">
        <!-- 오늘의 운세 카드 -->
        <div class="col-md-6">
            <a href="fortune.html" class="card h-100 hover-card">
                <div class="card-body">
                    <div class="icon">🍀</div>
                    <h2 class="card-title fw-bold mb-3">오늘의 운세</h2>
                    <p class="card-text text-muted fs-5 mb-4">당신의 오늘 하루 점수와 추천 메뉴를 확인해보세요!</p>
                    <div class="btn btn-primary btn-lg px-5 rounded-pill shadow-sm">시작하기</div>
                </div>
            </a>
        </div>

        <!-- 빵 심리테스트 카드 -->
        <div class="col-md-6">
            <a href="quiz/index.html" class="card h-100 hover-card">
                <div class="card-body">
                    <div class="icon">🍞</div>
                    <h2 class="card-title fw-bold mb-3">나는 어떤 빵일까?</h2>
                    <p class="card-text text-muted fs-5 mb-4">재미있는 빵 심리테스트로 나의 MBTI 성향을 알아보세요.</p>
                    <div class="btn btn-warning text-white btn-lg px-5 rounded-pill shadow-sm">시작하기</div>
                </div>
            </a>
        </div>
    </div>

    <footer class="mt-5 pt-5 text-muted">
        <p>&copy; <span id="year"></span> All Rights Reserved.</p>
    </footer>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
</script>

</body>
</html>
