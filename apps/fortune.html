<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .score-display {
            font-size: 3rem;
            font-weight: 800;
            color: #28a745;
        }
        .meal-card {
            background-color: #fff;
            border: 1px solid #e9ecef;
            border-radius: 15px;
            transition: transform 0.2s;
        }
        .meal-card:hover {
            transform: translateY(-5px);
        }
        #resultArea {
            display: none;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
        }
    </style>
</head>
<body>

<a href="index.html" class="btn btn-outline-secondary rounded-pill back-btn shadow-sm">← 홈으로</a>

<div class="container d-flex flex-column align-items-center">
    <h1 class="display-4 fw-bold text-primary mb-5 mt-4">오늘의 운세</h1>

    <div class="card p-4 p-md-5 w-100">
        <div class="card-body">
            <form id="fortuneForm" class="mb-4">
                <div class="mb-4 text-center">
                    <label for="nameInput" class="form-label fs-5 mb-3">이름을 입력하세요:</label>
                    <input type="text" id="nameInput" class="form-control form-control-lg text-center" placeholder="예: 홍길동" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">운세 확인하기</button>
            </form>

            <div id="resultArea" class="mt-5 text-center">
                <hr class="mb-5">
                <h2 class="fs-3 text-secondary mb-4"><span id="displayName" class="fw-bold text-dark"></span> 님의 오늘의 운세</h2>
                
                <div class="mb-5">
                    <div id="displayScore" class="score-display mb-3">0점</div>
                    <p id="displayMessage" class="fs-5 text-muted px-3"></p>
                </div>

                <div class="row g-4 mt-2">
                    <div class="col-md-6">
                        <div class="meal-card p-4 h-100">
                            <h3 class="fs-5 text-primary mb-3">점심 추천</h3>
                            <p id="displayLunch" class="fs-5 fw-bold mb-0 text-dark"></p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="meal-card p-4 h-100">
                            <h3 class="fs-5 text-primary mb-3">저녁 추천</h3>
                            <p id="displayDinner" class="fs-5 fw-bold mb-0 text-dark"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function hashCode(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash |= 0; 
        }
        return Math.abs(hash);
    }

    function pseudoRandom(seed) {
        let value = seed;
        return function() {
            value = (value * 9301 + 49297) % 233280;
            return value / 233280;
        };
    }

    const lunchOptions = ["제육볶음", "김치찌개", "떡볶이", "샐러드 파스타", "칼국수", "부대찌개", "비빔밥", "샌드위치", "돈까스", "초밥"];
    const dinnerOptions = ["스테이크", "삼겹살", "연어 스테이크", "아귀찜", "파스타", "불고기", "해물찜", "중국집 코스", "타코", "오마카세"];

    document.getElementById('fortuneForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;

        const today = new Date().toISOString().split('T')[0];
        const hash = hashCode(name + today);
        const random = pseudoRandom(hash);

        const score = Math.floor(random() * 101);
        let message = score >= 90 ? "최고의 하루!" : score >= 70 ? "좋은 하루!" : score >= 50 ? "평범한 하루!" : score >= 30 ? "주의가 필요한 하루!" : "조심해야 하는 하루!";

        document.getElementById('displayName').textContent = name;
        document.getElementById('displayScore').textContent = score + "점";
        document.getElementById('displayMessage').textContent = message;
        document.getElementById('displayLunch').textContent = lunchOptions[Math.floor(random() * lunchOptions.length)];
        document.getElementById('displayDinner').textContent = dinnerOptions[Math.floor(random() * dinnerOptions.length)];
        document.getElementById('resultArea').style.display = 'block';
    });
</script>

</body>
</html>
