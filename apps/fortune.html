<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Apple SD Gothic Neo', sans-serif; }
        .container { max-width: 600px; margin-top: 50px; margin-bottom: 50px; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .score-display { font-size: 2.5rem; font-weight: 800; color: #0d6efd; }
        .card-info { background-color: #fdfdfd; border: 1px solid #e9ecef; border-radius: 15px; }
        #resultArea { display: none; }
        .back-btn { position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>

<a href="index.html" class="btn btn-outline-secondary rounded-pill back-btn shadow-sm">← 홈으로</a>

<div class="container d-flex flex-column align-items-center">
    <h1 class="display-4 fw-bold text-primary mb-5 mt-4">오늘의 운세</h1>

    <div class="card p-4 p-md-5 w-100">
        <form id="fortuneForm" class="mb-4">
            <div class="mb-4 text-center">
                <label for="nameInput" class="form-label fs-5 mb-3">이름을 입력하세요:</label>
                <input type="text" id="nameInput" class="form-control form-control-lg text-center" placeholder="예: 홍길동" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">운세 확인하기</button>
        </form>

        <div id="resultArea" class="mt-4 text-center">
            <hr class="mb-4">
            <h2 class="fs-4 text-secondary mb-3"><span id="displayName" class="fw-bold text-dark"></span> 님의 운세</h2>
            <div id="displayScore" class="score-display mb-2">0점</div>
            <h4 id="displayGrade" class="text-primary fw-bold mb-3"></h4>
            <p id="displayMessage" class="fs-6 text-muted px-2 mb-4"></p>
            
            <div class="card-info p-3 mb-3 text-start">
                <p class="mb-1">✨ <strong>행운 아이템:</strong> <span id="displayItem"></span></p>
                <p class="mb-0">💡 <strong>오늘의 행동 지침:</strong> <span id="displayAction"></span></p>
            </div>

            <div class="row g-2">
                <div class="col-6">
                    <div class="card-info p-3">
                        <small class="text-primary d-block">점심</small>
                        <span id="displayLunch" class="fw-bold"></span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card-info p-3">
                        <small class="text-primary d-block">저녁</small>
                        <span id="displayDinner" class="fw-bold"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function hashCode(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0; 
        }
        return Math.abs(hash);
    }

    function pseudoRandom(seed) {
        let value = seed;
        return function() {
            value = (value * 9301 + 49297) % 233280;
            return value / 233280;
        };
    }

    const fortuneData = {
        90: { 
            grade: "로또 1등 직전!", 
            messages: ["세상이 당신을 돕는 날입니다. 자신 있게 도전하세요!", "행운이 발끝까지 차올랐어요. 오늘 대박 예감!", "무엇을 해도 성공할 완벽한 하루입니다."], 
            items: ["빨간 양말", "황금색 펜", "반짝이는 액세서리", "새 동전", "밝은 색 손수건"], 
            actions: ["복권 한 장 사기", "평소 가고 싶던 곳 가보기", "주변 사람에게 웃음 전파하기", "창문 활짝 열고 환기하기", "거울 보며 자신감 갖기"] 
        },
        70: { 
            grade: "기분 좋은 행운", 
            messages: ["생각지도 못한 작은 행운이 찾아옵니다.", "오늘 하루는 왠지 좋은 일이 있을 것 같아요.", "당신의 노력에 달콤한 결과가 따라옵니다."], 
            items: ["책 한 권", "시계", "향수", "작은 꽃 한 송이", "즐겨 먹는 사탕"], 
            actions: ["좋아하는 노래 듣기", "가족에게 안부 전화하기", "맛있는 간식 먹기", "노트 정리하기", "가벼운 산책하기"] 
        },
        40: { 
            grade: "평범한 하루", 
            messages: ["무난하고 평화로운 하루가 될 거예요.", "특별할 건 없지만 소소한 행복이 있네요.", "마음을 차분히 하면 좋은 기운이 깃들어요."], 
            items: ["물병", "이어폰", "노트", "펜", "머리끈"], 
            actions: ["10분 일찍 출근하기", "식물에 물 주기", "방 정리하기", "따뜻한 커피 마시기", "메일함 정리하기"] 
        },
        20: { 
            grade: "조심스러운 하루", 
            messages: ["오늘은 한 템포 쉬어가는 것이 좋습니다.", "신중함이 필요한 날이네요.", "너무 무리하지 말고 에너지를 아끼세요."], 
            items: ["따뜻한 물병", "포근한 담요", "안대", "비타민", "지우개"], 
            actions: ["일찍 귀가하기", "따뜻한 물로 샤워하기", "스마트폰 멀리하기", "차분한 음악 듣기", "조기 취침하기"] 
        },
        0: { 
            grade: "이불 밖은 위험해", 
            messages: ["오늘은 정말 조심해야 하는 날입니다.", "마음 편히 가지는 게 최고의 보약이에요.", "오늘 하루만 버티면 내일은 다를 거예요."], 
            items: ["부적", "따뜻한 핫팩", "귀마개", "쿠션", "인형"], 
            actions: ["명상하기", "일찍 잠자리에 들기", "집에서 푹 쉬기", "따뜻한 이불 덮기", "스트레칭 하기"] 
        }
    };

    const lunchOptions = ["제육볶음", "김치찌개", "떡볶이", "샐러드 파스타", "칼국수", "부대찌개", "비빔밥", "샌드위치", "돈까스", "초밥"];
    const dinnerOptions = ["스테이크", "삼겹살", "연어 스테이크", "아귀찜", "파스타", "불고기", "해물찜", "중국집 코스", "타코", "오마카세"];

    document.getElementById('fortuneForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;

        const today = new Date().toISOString().split('T')[0];
        const hash = hashCode(name + today);
        const random = pseudoRandom(hash);

        // 평균 80점대를 위한 가중치 적용
        const r = random();
        let score;
        if (r < 0.2) {
            score = Math.floor(r * 200) + 40; // 낮은 확률로 40~80점
        } else {
            score = Math.floor((r - 0.2) / 0.8 * 30) + 70; // 높은 확률로 70~100점
        }
        score = Math.min(100, score);
        
        let category;
        if (score >= 90) category = 90;
        else if (score >= 70) category = 70;
        else if (score >= 40) category = 40;
        else if (score >= 20) category = 20;
        else category = 0;

        let data = fortuneData[category];

        document.getElementById('displayName').textContent = name;
        document.getElementById('displayScore').textContent = score + "점";
        document.getElementById('displayGrade').textContent = data.grade;
        document.getElementById('displayMessage').textContent = data.messages[Math.floor(random() * data.messages.length)];
        document.getElementById('displayItem').textContent = data.items[Math.floor(random() * data.items.length)];
        document.getElementById('displayAction').textContent = data.actions[Math.floor(random() * data.actions.length)];
        document.getElementById('displayLunch').textContent = lunchOptions[Math.floor(random() * lunchOptions.length)];
        document.getElementById('displayDinner').textContent = dinnerOptions[Math.floor(random() * dinnerOptions.length)];
        document.getElementById('resultArea').style.display = 'block';
    });
</script>

</body>
</html>
