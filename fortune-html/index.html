<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 운세</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .score-display {
            font-size: 3rem;
            font-weight: 800;
            color: #28a745;
        }
        .meal-card {
            background-color: #fff;
            border: 1px solid #e9ecef;
            border-radius: 15px;
            transition: transform 0.2s;
        }
        .meal-card:hover {
            transform: translateY(-5px);
        }
        .footer {
            margin-top: 40px;
            color: #6c757d;
            font-size: 0.9rem;
        }
        #resultArea {
            display: none;
        }
    </style>
</head>
<body>

<div class="container d-flex flex-column align-items-center">
    <h1 class="display-4 fw-bold text-primary mb-5">오늘의 운세</h1>

    <div class="card p-4 p-md-5 w-100">
        <div class="card-body">
            <form id="fortuneForm" class="mb-4">
                <div class="mb-4 text-center">
                    <label for="nameInput" class="form-label fs-5 mb-3">이름을 입력하세요:</label>
                    <input type="text" id="nameInput" class="form-control form-control-lg text-center" placeholder="예: 홍길동" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">운세 확인하기</button>
            </form>

            <!-- 결과 표시 영역 -->
            <div id="resultArea" class="mt-5 text-center">
                <hr class="mb-5">
                <h2 class="fs-3 text-secondary mb-4"><span id="displayName" class="fw-bold text-dark"></span> 님의 오늘의 운세</h2>
                
                <div class="mb-5">
                    <div id="displayScore" class="score-display mb-3">0점</div>
                    <p id="displayMessage" class="fs-5 text-muted px-3"></p>
                </div>

                <div class="row g-4 mt-2">
                    <div class="col-md-6">
                        <div class="meal-card p-4 h-100">
                            <h3 class="fs-5 text-primary mb-3">점심 추천</h3>
                            <p id="displayLunch" class="fs-5 fw-bold mb-0 text-dark"></p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="meal-card p-4 h-100">
                            <h3 class="fs-5 text-primary mb-3">저녁 추천</h3>
                            <p id="displayDinner" class="fs-5 fw-bold mb-0 text-dark"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; <span id="year"></span> 오늘의 운세. All rights reserved.</p>
    </div>
</div>

<script>
    // 1. 현재 연도 업데이트
    document.getElementById('year').textContent = new Date().getFullYear();

    // 2. 해시 함수: 이름에 따라 일관된 결과를 내기 위함
    function hashCode(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash |= 0; 
        }
        return Math.abs(hash);
    }

    // 3. 의사 난수 생성기
    function pseudoRandom(seed) {
        let value = seed;
        return function() {
            value = (value * 9301 + 49297) % 233280;
            return value / 233280;
        };
    }

    // 4. 운세 로직
    const lunchOptions = [
        "든든한 제육볶음", "시원한 김치찌개", "매콤한 떡볶이", "상큼한 샐러드 파스타", "따뜻한 칼국수",
        "얼큰한 부대찌개", "고소한 비빔밥", "간단한 샌드위치", "새콤달콤 돈까스", "담백한 초밥"
    ];
    const dinnerOptions = [
        "화려한 스테이크", "푸짐한 삼겹살", "건강한 연어 스테이크", "매콤한 아귀찜", "향긋한 파스타",
        "전통 불고기", "해물찜", "중국집 코스 요리", "멕시칸 타코", "일식 오마카세"
    ];

    document.getElementById('fortuneForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return;

        // 오늘 날짜 문자열 생성 (예: "2026-04-15")
        const today = new Date().toISOString().split('T')[0];
        
        // 이름과 날짜를 결합하여 해시 생성 -> 매일 결과가 달라짐
        const hash = hashCode(name + today);
        const random = pseudoRandom(hash);

        const score = Math.floor(random() * 101);
        
        let message = "";
        if (score >= 90) message = "오늘은 모든 것이 당신의 뜻대로 흘러갈 거예요! 행운이 가득합니다.";
        else if (score >= 70) message = "긍정적인 에너지가 가득한 하루! 작은 도전들이 좋은 결과로 이어질 거예요.";
        else if (score >= 50) message = "평범하지만 안정적인 하루입니다. 주변을 잘 살피면 좋은 기회를 찾을 수 있어요.";
        else if (score >= 30) message = "오늘은 조심스럽게 행동하는 것이 좋습니다. 작은 어려움이 있을 수 있어요.";
        else message = "다소 운이 따르지 않는 하루가 될 수 있지만, 긍정적인 마음을 잃지 마세요!";

        const lunch = lunchOptions[Math.floor(random() * lunchOptions.length)];
        const dinner = dinnerOptions[Math.floor(random() * dinnerOptions.length)];

        // 결과 업데이트
        document.getElementById('displayName').textContent = name;
        document.getElementById('displayScore').textContent = score + "점";
        document.getElementById('displayMessage').textContent = message;
        document.getElementById('displayLunch').textContent = lunch;
        document.getElementById('displayDinner').textContent = dinner;

        // 결과 영역 표시
        document.getElementById('resultArea').style.display = 'block';

        // 부드러운 스크롤 효과
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
</script>

</body>
</html>
